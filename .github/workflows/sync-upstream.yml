name: Sync Upstream & Override

on:
  schedule:
    - cron: '0 2 * * 0'  # 每天凌晨2点
  workflow_dispatch:      # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/danxiaonuo/clash-docker.git 
          git fetch upstream

      - name: Force sync upstream
        run: |
          git checkout main
          # 备份 sync-upstream.yml
          cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml.bak
          # 强制重置到上游最新状态
          git reset --hard upstream/main
          # 恢复 sync-upstream.yml
          mkdir -p .github/workflows
          cp /tmp/sync-upstream.yml.bak .github/workflows/sync-upstream.yml
          git add .github/workflows/sync-upstream.yml
          git commit -m "preserve sync workflow" || true
          # 强制推送到 fork
          git push origin main --force
          echo "sync_status=success" >> $GITHUB_ENV
          echo "message=已强制同步上游，覆盖本地更改（保留 workflow 文件）" >> $GITHUB_ENV

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.163.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[clash-docker] Fork 已强制同步上游'
          to: seklure@seklure.com
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          html_body: |
            <h2>🔄 clash-docker 同步完成</h2>
            <table border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse;">
              <tr><td><b>仓库</b></td><td>seklure/clash-docker</td></tr>
              <tr><td><b>上游</b></td><td>danxiaonuo/clash-docker</td></tr>
              <tr><td><b>状态</b></td><td>✅ 强制同步完成</td></tr>
              <tr><td><b>时间</b></td><td>${{ github.event.repository.updated_at }}</td></tr>
              <tr><td><b>说明</b></td><td>本地更改已被上游版本覆盖（.github/workflows/sync-upstream.yml 已保留）</td></tr>
            </table>
            <p>查看详情：<a href="https://github.com/seklure/clash-docker ">仓库页面</a></p>
            <hr>
            <small>自动发送 by GitHub Actions</small>
